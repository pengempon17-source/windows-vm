services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      USERNAME: "admin"
      PASSWORD: "admin123"
      DISK_SIZE: "20G"
      RAM_SIZE: "4G"
      CPU_CORES: "2"
      VERSION: "https://archive.org/download/windows-10-tiny-b-4-x-64/Windows%2010%20%28tiny%20b4%29-X64.iso"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./windows:/storage
    restart: always
    stop_grace_period: 2m