services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      USERNAME: "admin"
      PASSWORD: "admin123"
      DISK_SIZE: "40G"
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      VERSION: "10"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./windows:/storage
    restart: always
    stop_grace_period: 2m
